version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: formatos_cuentas_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
    container_name: formatos_cuentas_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/formatos_cuentas
      - JWT_SECRET=${JWT_SECRET:-supersecretkey_change_me_in_production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - backend_uploads:/app/uploads
      - backend_generated:/app/generated
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: formatos_cuentas_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  backend_uploads:
  backend_generated:
